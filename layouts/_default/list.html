{{ define "main" }}
<div class="kins-list">
    <h1>{{ .Title }}</h1>
    
    <div class="search-container">
        <input type="text" id="kinSearch" placeholder="搜索 Kin 编号或名称..." class="search-input">
        <div class="filter-options">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="1-52">1-52</button>
            <button class="filter-btn" data-filter="53-104">53-104</button>
            <button class="filter-btn" data-filter="105-156">105-156</button>
            <button class="filter-btn" data-filter="157-208">157-208</button>
            <button class="filter-btn" data-filter="209-260">209-260</button>
        </div>
    </div>

    <div class="kins-grid">
        {{ range .Pages.ByParam "kin_number" }}
        <article class="kin-card" data-kin="{{ .Params.kin_number }}" data-name="{{ .Title }}">
            <div class="kin-card-header">
                <h2><a href="{{ .RelPermalink }}">Kin {{ .Params.kin_number }}</a></h2>
                <span class="kin-card-name">{{ .Params.kin_name }}</span>
            </div>
            <div class="kin-card-excerpt">
                {{ .Summary | truncate 100 }}
            </div>
            <div class="kin-card-footer">
                <a href="{{ .RelPermalink }}" class="read-more">阅读详情 →</a>
            </div>
        </article>
        {{ end }}
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const searchInput = document.getElementById('kinSearch');
    const filterButtons = document.querySelectorAll('.filter-btn');
    const kinCards = document.querySelectorAll('.kin-card');
    
    // 搜索功能
    searchInput.addEventListener('input', function(e) {
        const searchTerm = e.target.value.toLowerCase();
        
        kinCards.forEach(card => {
            const kinNumber = card.getAttribute('data-kin');
            const kinName = card.getAttribute('data-name').toLowerCase();
            
            if (kinNumber.includes(searchTerm) || kinName.includes(searchTerm)) {
                card.style.display = 'block';
            } else {
                card.style.display = 'none';
            }
        });
    });
    
    // 过滤功能
    filterButtons.forEach(button => {
        button.addEventListener('click', function() {
            // 移除所有按钮的 active 类
            filterButtons.forEach(btn => btn.classList.remove('active'));
            // 添加当前按钮的 active 类
            this.classList.add('active');
            
            const filter = this.getAttribute('data-filter');
            
            kinCards.forEach(card => {
                const kinNumber = parseInt(card.getAttribute('data-kin'));
                
                if (filter === 'all') {
                    card.style.display = 'block';
                } else {
                    const [min, max] = filter.split('-').map(Number);
                    if (kinNumber >= min && kinNumber <= max) {
                        card.style.display = 'block';
                    } else {
                        card.style.display = 'none';
                    }
                }
            });
        });
    });
});
</script>
{{ end }}
